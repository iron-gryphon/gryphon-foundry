# Slack notifications for main branch changes and Dependabot PRs.
# Uses Slack Workflow webhook (Workflow Builder). Requires SLACK_WEBHOOK_URL secret.
# See SETUP.md for workflow setup. Payload must be flat JSON with string values.

name: Slack Notifications

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened]
    branches: [main, master]

permissions:
  contents: read

jobs:
  notify-main:
    name: Notify - Main branch update
    if: github.event_name == 'push' && secrets.SLACK_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack Workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          COMPARE_URL: ${{ github.event.compare }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          MSG_TRUNCATED=$(echo "$COMMIT_MSG" | head -c 200)

          # Flat JSON payload for Slack Workflow webhook (no nested objects)
          PAYLOAD=$(jq -n \
            --arg event_type "main_update" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit_sha "$SHORT_SHA" \
            --arg commit_message "$MSG_TRUNCATED" \
            --arg author "$AUTHOR" \
            --arg compare_url "$COMPARE_URL" \
            '{
              event_type: $event_type,
              repo: $repo,
              branch: $branch,
              commit_sha: $commit_sha,
              commit_message: $commit_message,
              author: $author,
              compare_url: $compare_url
            }')

          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  notify-dependabot:
    name: Notify - Dependabot PR
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && secrets.SLACK_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack Workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BODY_TRUNCATED=$(echo "$PR_BODY" | head -c 300)

          # Flat JSON payload for Slack Workflow webhook (no nested objects)
          PAYLOAD=$(jq -n \
            --arg event_type "dependabot_pr" \
            --arg pr_number "$PR_NUM" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_url "$PR_URL" \
            --arg pr_body "$BODY_TRUNCATED" \
            '{
              event_type: $event_type,
              pr_number: $pr_number,
              pr_title: $pr_title,
              pr_url: $pr_url,
              pr_body: $pr_body
            }')

          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
